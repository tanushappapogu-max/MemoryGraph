<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MemoryGraph Live</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      background: transparent;
      color: #e4e4e7;
      overflow: hidden;
      -webkit-app-region: drag;
    }

    .container {
      background: rgba(12, 12, 16, 0.92);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── Header ─── */
    .header {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      justify-content: space-between;
      align-items: center;
      -webkit-app-region: drag;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
    }

    .logo.disconnected { background: #ef4444; box-shadow: 0 0 8px rgba(239, 68, 68, 0.5); }
    .logo.recording { animation: pulse 1.5s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .title { font-size: 13px; font-weight: 600; color: #a1a1aa; }

    .confidence {
      font-size: 12px;
      font-weight: 700;
      color: #22c55e;
      padding: 2px 8px;
      border-radius: 10px;
      background: rgba(34, 197, 94, 0.1);
      -webkit-app-region: no-drag;
    }

    /* ─── Content ─── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      -webkit-app-region: no-drag;
    }

    .content::-webkit-scrollbar { width: 4px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .section { margin-bottom: 16px; }
    .section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #71717a;
      margin-bottom: 8px;
    }

    /* ─── Person Card ─── */
    .person-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .person-name { font-size: 15px; font-weight: 700; color: white; }
    .person-meta { font-size: 12px; color: #a1a1aa; margin-top: 2px; }

    /* ─── Suggested Response ─── */
    .suggestion {
      background: rgba(34, 197, 94, 0.06);
      border: 1px solid rgba(34, 197, 94, 0.15);
      border-radius: 10px;
      padding: 12px;
      font-size: 13px;
      line-height: 1.5;
      color: #d4d4d8;
    }

    /* ─── Evidence ─── */
    .evidence-item {
      display: flex;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      font-size: 12px;
      line-height: 1.4;
    }

    .evidence-item:last-child { border-bottom: none; }
    .evidence-emoji { font-size: 14px; flex-shrink: 0; }
    .evidence-label { color: #a78bfa; font-weight: 600; font-size: 11px; }
    .evidence-text { color: #a1a1aa; }

    /* ─── Heat Bar ─── */
    .heat-bar {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .heat-chip {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 6px;
      font-weight: 600;
    }

    .heat-low { background: rgba(100, 116, 139, 0.2); color: #94a3b8; }
    .heat-medium { background: rgba(234, 179, 8, 0.15); color: #fbbf24; }
    .heat-high { background: rgba(249, 115, 22, 0.15); color: #fb923c; }
    .heat-critical { background: rgba(239, 68, 68, 0.15); color: #f87171; }

    /* ─── Input ─── */
    .input-area {
      padding: 12px 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      -webkit-app-region: no-drag;
    }

    .input-row { display: flex; gap: 8px; }

    .text-input {
      flex: 1;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      color: white;
      outline: none;
      transition: border-color 0.2s;
    }

    .text-input:focus { border-color: rgba(34, 197, 94, 0.5); }
    .text-input::placeholder { color: #52525b; }

    .btn {
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 600;
      color: #22c55e;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:hover { background: rgba(34, 197, 94, 0.25); }

    .btn-record {
      background: rgba(239, 68, 68, 0.15);
      border-color: rgba(239, 68, 68, 0.3);
      color: #ef4444;
    }

    .btn-record.active {
      background: rgba(239, 68, 68, 0.3);
      animation: pulse 1.5s infinite;
    }

    /* ─── Status ─── */
    .status-bar {
      padding: 8px 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      font-size: 11px;
      color: #52525b;
      display: flex;
      justify-content: space-between;
      -webkit-app-region: no-drag;
    }

    /* ─── Stealth ─── */
    .stealth-indicator {
      display: none;
      position: absolute;
      top: 8px;
      right: 8px;
      font-size: 10px;
      color: #ef4444;
      background: rgba(239, 68, 68, 0.1);
      padding: 2px 6px;
      border-radius: 4px;
    }

    body.stealth .stealth-indicator { display: block; }
    body.stealth .container { border-color: rgba(239, 68, 68, 0.2); }

    /* ─── Empty State ─── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #52525b;
    }

    .empty-state h3 { color: #a1a1aa; margin-bottom: 8px; font-size: 14px; }
    .empty-state p { font-size: 12px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="stealth-indicator">STEALTH</div>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <div class="logo" id="statusDot"></div>
        <span class="title">MemoryGraph Live</span>
      </div>
      <span class="confidence" id="confidenceBadge">--</span>
    </div>

    <div class="content" id="content">
      <div class="empty-state" id="emptyState">
        <h3>Waiting for input</h3>
        <p>Type a question below, or start recording audio from a call.<br><br>
        <strong>Shortcuts:</strong><br>
        Ctrl+Shift+M — toggle visibility<br>
        Ctrl+Shift+S — stealth mode<br>
        Ctrl+Shift+C — capture clipboard</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <input type="text" class="text-input" id="queryInput" placeholder="Type or paste dialogue...">
        <button class="btn" id="queryBtn">Ask</button>
        <button class="btn btn-record" id="recordBtn" title="Simulate audio">Rec</button>
      </div>
    </div>

    <div class="status-bar">
      <span id="statusText">Connecting...</span>
      <span id="memoryCount">--</span>
    </div>
  </div>

  <script>
    const content = document.getElementById("content");
    const emptyState = document.getElementById("emptyState");
    const queryInput = document.getElementById("queryInput");
    const queryBtn = document.getElementById("queryBtn");
    const recordBtn = document.getElementById("recordBtn");
    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");
    const memoryCount = document.getElementById("memoryCount");
    const confidenceBadge = document.getElementById("confidenceBadge");

    let isRecording = false;
    let transcriptBuffer = "";

    // ─── Init ──────────────────────────────────────────────────────────
    async function init() {
      const health = await window.memorygraph.getHealth();
      if (health.ok) {
        statusDot.className = "logo";
        statusText.textContent = `Connected — ${health.counts.memories} memories`;
        memoryCount.textContent = `${health.counts.memories} mem`;
      } else {
        statusDot.className = "logo disconnected";
        statusText.textContent = "Daemon not running — start with: npm run daemon";
      }
    }

    // ─── Query ─────────────────────────────────────────────────────────
    async function doQuery(dialogue) {
      if (!dialogue.trim()) return;

      confidenceBadge.textContent = "...";
      const result = await window.memorygraph.queryMemory(dialogue);

      if (!result.ok) {
        statusText.textContent = result.error || "Query failed";
        return;
      }

      emptyState.style.display = "none";
      confidenceBadge.textContent = result.confidence + "%";
      renderInsight(result);
    }

    function renderInsight(data) {
      let html = "";

      // Person card
      if (data.person) {
        html += `<div class="section">
          <div class="person-card">
            <div class="person-name">${esc(data.person.name)}</div>
            <div class="person-meta">${esc(data.person.company || "")} ${data.person.role ? "— " + esc(data.person.role) : ""}</div>
          </div>
        </div>`;
      }

      // Suggested response
      if (data.suggestedResponse) {
        html += `<div class="section">
          <div class="section-title">Suggested Response</div>
          <div class="suggestion">${esc(data.suggestedResponse)}</div>
        </div>`;
      }

      // Evidence
      if (data.evidence && data.evidence.length) {
        html += `<div class="section"><div class="section-title">Evidence</div>`;
        for (const ev of data.evidence.slice(0, 5)) {
          html += `<div class="evidence-item">
            <span class="evidence-emoji">${ev.emoji}</span>
            <div>
              <div class="evidence-label">${esc(ev.label)}</div>
              <div class="evidence-text">${esc(ev.text)}</div>
            </div>
          </div>`;
        }
        html += `</div>`;
      }

      // Heat bar
      if (data.heatBar && data.heatBar.length) {
        html += `<div class="section"><div class="section-title">Active Topics</div><div class="heat-bar">`;
        for (const h of data.heatBar) {
          html += `<span class="heat-chip heat-${h.level}">${esc(h.topic)}</span>`;
        }
        html += `</div></div>`;
      }

      // Connections
      if (data.connections && data.connections.length) {
        html += `<div class="section"><div class="section-title">Graph Connections</div>`;
        for (const c of data.connections.slice(0, 3)) {
          html += `<div class="evidence-item">
            <span class="evidence-emoji">🔗</span>
            <div class="evidence-text">${esc(c.why)}</div>
          </div>`;
        }
        html += `</div>`;
      }

      content.innerHTML = html;
    }

    // ─── Simulated Recording ───────────────────────────────────────────
    function toggleRecording() {
      isRecording = !isRecording;
      if (isRecording) {
        recordBtn.classList.add("active");
        recordBtn.textContent = "Stop";
        statusDot.className = "logo recording";
        statusText.textContent = "Recording — paste or type transcript chunks";
      } else {
        recordBtn.classList.remove("active");
        recordBtn.textContent = "Rec";
        statusDot.className = "logo";

        // Ingest accumulated transcript
        if (transcriptBuffer.length >= 12) {
          window.memorygraph.ingestTranscript(transcriptBuffer, "overlay");
          statusText.textContent = "Transcript captured and ingested";
        }
        transcriptBuffer = "";
      }
    }

    // ─── Events ────────────────────────────────────────────────────────
    queryBtn.addEventListener("click", () => doQuery(queryInput.value));
    queryInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        if (isRecording) {
          // In recording mode, accumulate transcript
          transcriptBuffer += " " + queryInput.value;
          doQuery(transcriptBuffer);
          queryInput.value = "";
        } else {
          doQuery(queryInput.value);
        }
      }
    });
    recordBtn.addEventListener("click", toggleRecording);

    // Stealth mode
    window.memorygraph.onStealthMode((active) => {
      document.body.classList.toggle("stealth", active);
    });

    window.memorygraph.onCaptureSuccess((msg) => {
      statusText.textContent = msg;
    });

    window.memorygraph.onCaptureError((msg) => {
      statusText.textContent = msg;
    });

    function esc(str) {
      const div = document.createElement("div");
      div.textContent = str || "";
      return div.innerHTML;
    }

    init();
    // Refresh health every 10s
    setInterval(init, 10000);
  </script>
</body>
</html>
